<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Silver Frame Studios | High-End Photography</title>
    <meta name="description" content="Professional, stunning photography studio specializing in high-end portraits, landscapes, products, and weddings.">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Outfit:wght@200;400;600;800&display=swap" rel="stylesheet">
    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">
    <!-- Feather Icons -->
    <script src="https://unpkg.com/feather-icons"></script>
</head>
<body>
    <!-- Custom Cursor -->
    <div class="cursor"></div>
    <div class="cursor-follower"></div>

    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">
                <span class="silver">Silver</span><span>Frame</span>
            </a>
            <ul class="nav-links">
                <li><a href="index.html" class="nav-link">Home</a></li>
                <li><a href="about.html" class="nav-link">About</a></li>
                <li><a href="portfolio.html" class="nav-link">Portfolio</a></li>
                <li><a href="services.html" class="nav-link">Services</a></li>
                <li><a href="contact.html" class="nav-link">Contact</a></li>
            </ul>
            <div class="hamburger">
                <i data-feather="menu"></i>
            </div>
        </div>
    </nav>

    <!-- Hero Section -->
    <section id="home" class="hero">
        <div class="hero-bg">
            <img src="assets/images/hero_bg.png" alt="Silver Frame Studio Camera Setup">
            <div class="overlay"></div>
        </div>
        <div class="hero-content reveal">
            <h1 class="stagger-text">Capturing<br><span class="highlight">Elegance</span></h1>
            <p class="stagger-text">High-end photography for brands, individuals, and moments that matter.</p>
            <a href="portfolio.html" class="cta-button stagger-text">View Portfolio</a>
        </div>
    </section>

    <!-- Footer -->
    <footer>
        <div class="container footer-content">
            <div class="footer-brand">
                <a href="index.html" class="logo">
                    <span class="silver">Silver</span><span>Frame</span>
                </a>
                <p>&copy; 2026 Silver Frame Studios. All rights reserved.</p>
            </div>
            <div class="social-links">
                <a href="#" aria-label="Instagram"><i data-feather="instagram"></i></a>
                <a href="#" aria-label="Twitter"><i data-feather="twitter"></i></a>
                <a href="#" aria-label="Facebook"><i data-feather="facebook"></i></a>
            </div>
        </div>
    </footer>

    <!-- Scripts -->
    <script>
        feather.replace();
    </script>
    <script src="js/main.js"></script>
</body>
</html>
